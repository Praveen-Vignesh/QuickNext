# Render Blueprint for the QuickNext API.
#
# Render → New → Blueprint → pick this repo. Everything below is applied
# automatically; only the secrets (sync: false) are prompted for.
services:
  - type: web
    name: quicknext-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start

    # Render pings this after each deploy and will fail the deploy if it
    # doesn't return 200 — which is what we want: a backend that can't reach
    # Atlas should not go live pretending to be healthy.
    healthCheckPath: /api/health

    envVars:
      # sync: false => Render prompts for the value and never stores it in git.
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

      # Your exact Vercel URL, no trailing slash. Comma-separate to add more.
      # This is what lets the deployed frontend talk to this API at all.
      - key: CORS_ORIGINS
        sync: false

      # Optional. Leave unset to disable Google sign-in (demo accounts still work).
      - key: GOOGLE_CLIENT_ID
        sync: false

      # Optional. Leave BOTH unset to run checkout on the simulated payment path.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      # Render injects PORT itself — do not set it here.
