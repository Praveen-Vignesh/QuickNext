<body class="bg-background text-on-background min-h-screen flex font-body-md overflow-x-hidden">
<!-- Top Navigation for Minimalist Context (No Shell Navs as this is a transactional page) -->

</div>
</header>

<div class="flex-1 flex flex-col md:flex-row w-full h-screen max-w-max-width mx-auto">

<div class="w-full max-w-[440px] flex flex-col gap-unit-lg">
<div class="flex flex-col gap-unit-xs">
<h1 class="font-headline-lg text-headline-lg text-primary text-center md:text-left">Welcome Back</h1>
<p class="font-body-md text-body-md text-secondary text-center md:text-left">Enter your details to access your account.</p>
</div>
<form class="flex flex-col gap-unit-md mt-unit-sm">
<div class="flex flex-col gap-unit-xs relative">
<label class="font-label-sm text-label-sm text-secondary uppercase tracking-widest" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-secondary/30 focus:border-primary focus:ring-0 px-0 py-unit-sm font-body-md text-primary transition-colors placeholder:text-secondary-fixed-dim" id="email" name="email" placeholder="name@domain.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-unit-xs relative">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-secondary uppercase tracking-widest" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors underline decoration-secondary/30 underline-offset-4" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-secondary/30 focus:border-primary focus:ring-0 px-0 py-unit-sm font-body-md text-primary transition-colors placeholder:text-secondary-fixed-dim" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="mt-unit-md flex flex-col gap-unit-sm">
<button class="w-full bg-primary text-on-primary py-4 font-label-md text-label-md uppercase tracking-widest hover:bg-inverse-surface transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">
                            Sign In
                            <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
</button>
<div class="relative flex py-unit-sm items-center">
<div class="flex-grow border-t border-secondary/20"></div>
<span class="flex-shrink-0 mx-4 text-secondary font-label-sm text-label-sm uppercase tracking-widest">Or</span>
<div class="flex-grow border-t border-secondary/20"></div>
</div>
<button class="w-full bg-transparent border border-secondary/30 text-primary py-4 font-label-md text-label-md tracking-widest hover:bg-surface-container transition-all duration-300 flex items-center justify-center gap-3" type="button">

<p class="font-label-md text-label-md uppercase tracking-widest opacity-80">The Heritage Collection</p>
