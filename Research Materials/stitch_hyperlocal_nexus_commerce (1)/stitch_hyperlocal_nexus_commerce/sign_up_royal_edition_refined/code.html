<style>
        .role-toggle-active {
            background-color: theme('colors.primary');
            color: theme('colors.on-primary');
        }

            color: theme('colors.secondary');
        }

        .input-minimal {
            border: none;
            border-bottom: 1px solid theme('colors.secondary');
            background: transparent;
            border-radius: 0;
            padding-left: 0;
            padding-right: 0;
            border-bottom-color: rgba(101, 93, 84, 0.3); /* match secondary/30 from SCREEN_6 */
        }

        .input-minimal:focus {

            box-shadow: none;

<body class="bg-background text-on-background min-h-screen flex items-center justify-center font-body-md antialiased p-unit-md md:p-margin">
<main class="w-full max-w-[1440px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-gutter items-center min-h-[707px]">
<!-- Image Canvas -->
<div class="hidden lg:block lg:col-span-6 h-full min-h-[600px] rounded-lg overflow-hidden relative">
<div class="w-full h-full bg-cover bg-center absolute inset-0" data-alt="A luxurious, minimalist architectural interior featuring grand, pale stone columns and sweeping arched doorways. The scene is bathed in soft, diffused natural daylight that casts gentle, sweeping shadows across the pristine ivory floors. A delicate, abstract golden sculpture sits unobtrusively in the distance. The mood is serene, commanding, and elegantly editorial, embodying a 'New Heritage' aesthetic with extreme whitespace and a restrained, sophisticated color palette of creams and subtle taupes." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDJr-0X3TyANHWlsHfbFfHFopVh2_Dxgw20-eBPCPIfB3PtmJuKyBJR6BuMiYxjzHk5IuQw1sN-o3Edh7RRAxlAKa2ZavGeBMmoDGTrxw0sRVbmRVKMTnRj2xzUgDeO6mTOTuQL2L2hSGyfSq4w8vd9aqikT_9OIWGFOvOAKGFfE5CqlekJSE-CCojE_WtlnJGJ__ApzswIHBCUDEujq355bAk9Z5b5Ch-klHgo92HvmRBfSv3UGJSXoZKfRhwV0g-PHIYxWCruoelo')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent flex items-end p-unit-xl">
<div class="text-on-primary">
<p class="font-headline-md text-headline-md mb-unit-sm">"Commerce elevated to an art form."</p>
<p class="font-label-md text-label-md uppercase tracking-widest opacity-80">NextGen Vision</p>
</div>
</div>
</div>
<!-- Form Canvas -->
<div class="col-span-1 lg:col-span-5 lg:col-start-8 w-full max-w-md mx-auto">
<header class="mb-unit-xl text-center md:text-left flex flex-col gap-unit-xs">
<span class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary tracking-tighter block mb-unit-lg absolute top-0 left-0 w-full text-center py-unit-lg md:relative md:text-left md:py-0">NextGen</span>
<div class="mt-24 md:mt-0">
<h1 class="font-headline-lg text-headline-lg text-primary text-center md:text-left">Join NextGen</h1>
<p class="font-body-md text-body-md text-secondary text-center md:text-left">Begin your curated experience.</p>
</div>
</header>
<form action="#" class="space-y-unit-lg" method="POST">
<!-- Role Toggle -->
<div class="flex p-1 border-b border-secondary/30 w-full md:w-max mx-auto lg:mx-0">
<button class="role-toggle-active flex-1 md:flex-none px-unit-lg py-2 font-label-md text-label-md transition-all duration-300 ease-out uppercase tracking-widest" id="btn-customer" type="button">
                        Customer
                    </button>
<button class="role-toggle-inactive flex-1 md:flex-none px-unit-lg py-2 font-label-md text-label-md transition-all duration-300 ease-out uppercase tracking-widest" id="btn-vendor" type="button">
                        Vendor
                    </button>
</div>
<input id="role-input" name="role" type="hidden" value="customer"/>
<!-- Fields -->
<div class="space-y-unit-md mt-unit-sm">
<div class="flex flex-col gap-unit-xs relative group">
<label class="font-label-sm text-label-sm text-secondary uppercase tracking-widest transition-colors group-focus-within:text-primary" for="name">Full Name</label>
<input class="input-minimal w-full font-body-md text-body-md text-primary pb-2 transition-colors placeholder:text-secondary-fixed-dim" id="name" name="name" placeholder="Jane Doe" required="" type="text"/>
</div>
<div class="flex flex-col gap-unit-xs relative group">
<label class="font-label-sm text-label-sm text-secondary uppercase tracking-widest transition-colors group-focus-within:text-primary" for="email">Email Address</label>
<input class="input-minimal w-full font-body-md text-body-md text-primary pb-2 transition-colors placeholder:text-secondary-fixed-dim" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-unit-xs relative group">
<label class="font-label-sm text-label-sm text-secondary uppercase tracking-widest transition-colors group-focus-within:text-primary" for="password">Password</label>
<div class="relative w-full">
<input class="input-minimal w-full font-body-md text-body-md text-primary pb-2 pr-8 transition-colors placeholder:text-secondary-fixed-dim" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-0 top-0 text-secondary hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Actions -->
<div class="mt-unit-lg flex flex-col gap-unit-sm pt-unit-sm">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md uppercase tracking-widest py-4 flex items-center justify-center gap-2 hover:bg-inverse-surface transition-all duration-300 ease-out group" type="submit">
                        Create Account
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
</button>
<div class="relative flex py-unit-sm items-center">
<div class="flex-grow border-t border-secondary/20"></div>
<span class="flex-shrink-0 mx-4 text-secondary font-label-sm text-label-sm uppercase tracking-widest">Or</span>
<div class="flex-grow border-t border-secondary/20"></div>
</div>
<button class="w-full bg-transparent border border-secondary/30 text-primary font-label-md text-label-md tracking-widest py-4 flex items-center justify-center gap-3 hover:bg-surface-container transition-all duration-300 ease-out" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Sign up with Google
                    </button>
</div>
<div class="text-center mt-unit-lg">
<p class="font-body-md text-body-md text-secondary">
                        Already have an account? 
                        <a class="text-primary font-body-md text-body-md hover:opacity-70 transition-opacity underline decoration-primary/30 underline-offset-4" href="#">Sign in</a>
</p>
</div>
</form>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnCustomer = document.getElementById('btn-customer');
            const btnVendor = document.getElementById('btn-vendor');
            const roleInput = document.getElementById('role-input');

            function setRole(role) {
                roleInput.value = role;
                if (role === 'customer') {
                    btnCustomer.className = 'role-toggle-active flex-1 md:flex-none px-unit-lg py-2 font-label-md text-label-md transition-all duration-300 ease-out uppercase tracking-widest';
                    btnVendor.className = 'role-toggle-inactive flex-1 md:flex-none px-unit-lg py-2 font-label-md text-label-md transition-all duration-300 ease-out uppercase tracking-widest';
                } else {
                    btnVendor.className = 'role-toggle-active flex-1 md:flex-none px-unit-lg py-2 font-label-md text-label-md transition-all duration-300 ease-out uppercase tracking-widest';
                    btnCustomer.className = 'role-toggle-inactive flex-1 md:flex-none px-unit-lg py-2 font-label-md text-label-md transition-all duration-300 ease-out uppercase tracking-widest';
                }
            }

            btnCustomer.addEventListener('click', () => setRole('customer'));
            btnVendor.addEventListener('click', () => setRole('vendor'));
        });
    </script>
</body></html>
