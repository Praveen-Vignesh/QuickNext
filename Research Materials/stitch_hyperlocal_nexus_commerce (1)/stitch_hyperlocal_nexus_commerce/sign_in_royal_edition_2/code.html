<body class="bg-surface text-on-background min-h-screen flex items-center justify-center p-gutter">
<!-- Transactional Screen - No Navigation Shell -->
<div class="w-full max-w-md bg-surface-container-lowest border border-secondary-container rounded-lg p-unit-xl">
<header class="mb-unit-lg text-center">
<h1 class="font-headline-md text-headline-md text-primary mb-unit-sm">Welcome Back</h1>
<p class="font-body-md text-body-md text-secondary">Enter your details to access your curated marketplace experience.</p>
</header>
<form class="space-y-unit-md">
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-unit-xs" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 font-body-sm text-body-sm text-on-background px-0 py-2 transition-colors duration-300" id="email" placeholder="name@example.com" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-unit-xs">
<label class="block font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors duration-300" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 font-body-sm text-body-sm text-on-background px-0 py-2 transition-colors duration-300" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary text-on-primary py-3 rounded-DEFAULT font-label-md text-label-md flex justify-center items-center gap-2 hover:bg-surface-tint transition-colors duration-300 mt-unit-lg group" type="button">
                Sign In
                <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform duration-300">arrow_forward</span>
</button>
</form>
<div class="flex items-center my-unit-lg">
<div class="flex-grow border-t border-secondary-container"></div>
<span class="px-4 font-label-sm text-label-sm text-secondary">OR</span>
<div class="flex-grow border-t border-secondary-container"></div>
</div>
<button class="w-full border border-secondary text-primary py-3 rounded-DEFAULT font-label-md text-label-md flex justify-center items-center gap-2 hover:bg-surface-container-low transition-colors duration-300" type="button">
